<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet"> 
    <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=League+Spartan:wght@100..900&display=swap" rel="stylesheet">
</head>
<body>
   <header>
        <span id="logo">Metalex</span> <!--Esto hay que cambiarlo por un <img src="/img/logo.png" cuando lo tengamos-->
        <div class="toggle-btn">
            <i class="fa-solid fa-bars-staggered"></i>
        </div>
        <nav id="nav-bar">
            <ul id="item-list">
                <li class="items">
                    <a href="">Inicio</a>
                </li>
                <li class="items">
                    <a href="">Servicios</a>
                </li>
                <li class="items">
                    <a href="">Galería</a>
                </li>
            </ul>
        </nav>
        <a id="contact" href="">Contacto</a>
   </header>
   <section id="hero">
            <h1>La Excelencia del Metal <br>en Cada <span>Detalle</h1>
            <p>Máxima resistencia con acabados impecables</p>
            <div class="hero-cta">
                <a id="hero-btn-contact" href="">¡Hablamos!</a>
                <a class="btn" href="https://wa.me/+34678578720">
                    <i class="fa-brands fa-whatsapp"></i>
                </a>
            </div>
            <div class="container-btns">
                <a class="btn" href="https://wa.me/+34678578720">
                    <i class="fa-solid fa-envelope"></i>
                </a>
                <a class="btn" href="https://wa.me/+34678578720">
                    <i class="fa-brands fa-facebook"></i>
                </a>
                <a class="btn" href="https://wa.me/+34678578720">
                    <i class="fa-brands fa-instagram"></i>
                </a>   
            </div>
            <div class="glass-card">
                <h2 class="hl-card">+15 Años</h2>
                <span class="description">De experiencia en el sector.</span>
            </div>
   </section>

   <script>
        const toggleBtn = document.querySelector('.toggle-btn');
        const navBar = document.querySelector('#nav-bar');

        toggleBtn.addEventListener('click', () => {
        navBar.classList.toggle('active');
        });
    </script>
</body>
</html>
